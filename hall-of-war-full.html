<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercenaires — Hall of War</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --blood: #8B0000; --fire: #CC3300; --ember: #FF6633;
  --gold: #C8960C; --gold-light: #FFD700;
  --stone: #0d0a08; --stone2: #1a1208; --stone3: #241808;
  --parchment: #f0e6cc; --parchment-dim: #a08060; --iron: #3a3020;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--stone); color:var(--parchment); font-family:'Inter',sans-serif; font-size:14px; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background:radial-gradient(ellipse at 20% 0%,rgba(139,0,0,0.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(200,50,0,0.07) 0%,transparent 50%); }

/* HEADER */
.site-header { position:relative; z-index:10; text-align:center; padding:32px 20px 16px; border-bottom:2px solid var(--blood); background:linear-gradient(180deg,rgba(139,0,0,0.2) 0%,transparent 100%); }
.site-header::before { content:'⚔'; position:absolute; left:28px; top:50%; transform:translateY(-50%); font-size:28px; opacity:0.25; }
.site-header::after { content:'⚔'; position:absolute; right:28px; top:50%; transform:translateY(-50%) scaleX(-1); font-size:28px; opacity:0.25; }
.site-title { font-family:'Cinzel Decorative',cursive; font-size:clamp(20px,4vw,38px); font-weight:900; color:var(--fire); letter-spacing:4px; text-shadow:0 0 30px rgba(200,50,0,0.4); }
.site-sub { font-size:11px; color:var(--parchment-dim); letter-spacing:6px; margin-top:5px; text-transform:uppercase; }

/* ANNONCE */
#annonce-bar { display:none; position:relative; z-index:5; background:linear-gradient(135deg,rgba(139,0,0,0.35),rgba(200,50,0,0.15)); border-bottom:1px solid var(--blood); }
#annonce-inner { max-width:1200px; margin:0 auto; padding:10px 24px; display:flex; align-items:center; justify-content:center; gap:10px; text-align:center; }
#annonce-text { font-size:14px; color:var(--parchment); line-height:1.6; }

/* NAV */
nav { position:sticky; top:0; z-index:100; background:var(--stone2); border-bottom:1px solid var(--iron); display:flex; align-items:stretch; min-height:42px; overflow:visible; }
.nav-scroll-area { display:flex; align-items:center; padding:0 8px; overflow-x:auto; scrollbar-width:none; flex:1; }
.nav-scroll-area::-webkit-scrollbar { display:none; }
.nav-arrow-btn { background:none; border:none; color:var(--parchment-dim); cursor:pointer; padding:0 12px; font-size:20px; flex-shrink:0; border-right:1px solid var(--iron); transition:color 0.2s,background 0.2s; }
.nav-arrow-btn.right { border-right:none; border-left:1px solid var(--iron); }
.nav-arrow-btn:hover { color:var(--ember); background:rgba(200,50,0,0.1); }
.nav-wars-dropdown { position:relative; flex-shrink:0; border-left:1px solid var(--iron); border-right:1px solid var(--iron); }
.nav-wars-btn { background:none; border:none; color:var(--parchment-dim); cursor:pointer; padding:0 16px; height:100%; font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; transition:color 0.2s; white-space:nowrap; }
.nav-wars-btn:hover { color:var(--ember); }
.nav-wars-list { display:none; position:absolute; left:50%; transform:translateX(-50%); top:100%; background:var(--stone2); border:1px solid var(--iron); border-top:2px solid var(--fire); border-radius:0 0 8px 8px; width:300px; z-index:200; max-height:440px; overflow-y:auto; box-shadow:0 12px 32px rgba(0,0,0,0.7); }
.nav-wars-list.open { display:block; }
.nav-wars-list button { display:block; width:100%; background:none; border:none; border-bottom:1px solid var(--iron); color:var(--parchment-dim); font-size:13px; padding:12px 20px; text-align:center; cursor:pointer; transition:background 0.15s,color 0.15s; letter-spacing:1px; }
.nav-wars-list button:last-child { border-bottom:none; }
.nav-wars-list button:hover, .nav-wars-list button.active { background:rgba(200,50,0,0.15); color:var(--ember); }
.nav-btn { font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:1px; color:var(--parchment-dim); background:none; border:none; border-bottom:2px solid transparent; padding:0 14px; height:42px; cursor:pointer; white-space:nowrap; transition:color 0.2s,border-color 0.2s; text-transform:uppercase; }
.nav-btn:hover { color:var(--parchment); }
.nav-btn.active { color:var(--ember); border-bottom-color:var(--fire); }
.nav-sep { color:var(--iron); padding:0 2px; font-size:10px; }

/* SEARCH */
.search-wrap { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:18px 24px 0; }
.search-wrap input { width:100%; max-width:420px; background:var(--stone2); border:1px solid var(--iron); border-radius:6px; color:var(--parchment); font-family:'Inter',sans-serif; font-size:13px; padding:9px 14px 9px 34px; outline:none; transition:border-color 0.2s; }
.search-wrap input:focus { border-color:var(--fire); }
.search-wrap input::placeholder { color:var(--parchment-dim); }
.search-wrap::before { content:'🔍'; position:absolute; left:36px; top:27px; font-size:13px; opacity:0.5; pointer-events:none; }
#search-panel { display:none; position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:12px 24px; }

/* MAIN */
main { position:relative; z-index:1; padding:24px; max-width:1200px; margin:0 auto; }
.page { display:none; }
.page.active { display:block; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* SECTION TITLE */
.section-title { font-family:'Cinzel Decorative',cursive; font-size:clamp(13px,2vw,18px); color:var(--gold-light); letter-spacing:3px; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--iron); display:flex; align-items:center; gap:10px; }
.section-title::before { content:'⚔'; font-size:14px; opacity:0.5; }

/* INFO CARDS */
.info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:12px; margin-bottom:22px; }
.info-card { background:var(--stone2); border:1px solid var(--iron); border-radius:8px; overflow:hidden; }
.info-card-title { font-family:'Cinzel',serif; font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; text-align:center; padding:8px; background:rgba(139,0,0,0.3); border-bottom:1px solid var(--iron); color:var(--gold-light); }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:7px 14px; border-bottom:1px solid rgba(255,255,255,0.04); gap:10px; }
.info-row:last-child { border-bottom:none; }
.info-label { color:var(--parchment-dim); flex-shrink:0; font-size:13px; }
.info-value { color:var(--parchment); font-weight:600; font-size:13px; text-align:right; }
.info-value.highlight { color:var(--ember); }

/* TABLE */
.table-wrap { overflow-x:auto; border-radius:8px; border:1px solid var(--iron); margin-bottom:22px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { background:rgba(139,0,0,0.4); }
th { font-family:'Cinzel',serif; font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--gold-light); padding:10px 12px; text-align:left; cursor:pointer; white-space:nowrap; user-select:none; border-bottom:1px solid var(--iron); transition:background 0.15s; }
th:hover { background:rgba(200,50,0,0.2); }
th.sorted-asc::after { content:' ↑'; color:var(--ember); }
th.sorted-desc::after { content:' ↓'; color:var(--ember); }
tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:background 0.15s; }
tbody tr:hover { background:rgba(255,255,255,0.03); }
td { padding:9px 12px; color:var(--parchment); vertical-align:middle; }
td.num { font-family:'Cinzel',serif; font-size:12px; color:var(--parchment-dim); }
td.rank-1 { color:var(--gold-light); font-weight:700; }
td.rank-2 { color:#C0C0C0; }
td.rank-3 { color:var(--ember); }
td.name-cell { font-family:'Cinzel',serif; font-size:13px; font-weight:600; }

/* PODIUM */
.podium { display:flex; align-items:flex-end; justify-content:center; gap:10px; margin-bottom:32px; }
.p-item { display:flex; flex-direction:column; align-items:center; flex:1; max-width:240px; }
.p-avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel Decorative',cursive; font-weight:900; margin-bottom:8px; position:relative; }
.p-item.gold .p-avatar { width:80px; height:80px; font-size:28px; background:radial-gradient(circle at 30% 30%,#ff8855,#CC3300,#8B0000); color:#f0e6cc; box-shadow:0 0 28px rgba(200,50,0,0.6); }
.p-item.silver .p-avatar { width:64px; height:64px; font-size:22px; background:radial-gradient(circle at 30% 30%,#E8E8E8,#C0C0C0,#808080); color:#2a2a2a; }
.p-item.bronze .p-avatar { width:64px; height:64px; font-size:22px; background:radial-gradient(circle at 30% 30%,#E8A96A,#CD7F32,#8B4513); color:#2a1a00; }
.p-badge { position:absolute; top:-6px; right:-6px; font-size:16px; }
.p-name { font-family:'Cinzel',serif; font-size:13px; font-weight:600; letter-spacing:1px; margin-bottom:4px; text-align:center; }
.p-item.gold .p-name { font-size:15px; color:#FF6633; }
.p-item.silver .p-name { color:#C0C0C0; }
.p-item.bronze .p-name { color:#E8A96A; }
.p-medals { display:flex; flex-wrap:wrap; justify-content:center; gap:2px; margin-bottom:4px; min-height:24px; }
.p-score { font-size:11px; color:var(--parchment-dim); margin-bottom:7px; font-family:'Cinzel',serif; }
.p-item.gold .p-score { color:var(--ember); font-weight:600; }
.p-block { width:100%; border-radius:6px 6px 0 0; display:flex; align-items:center; justify-content:center; font-family:'Cinzel Decorative',cursive; font-weight:900; }
.p-item.gold .p-block { height:96px; font-size:24px; background:linear-gradient(180deg,#CC3300,#8B0000); color:#f0e6cc; }
.p-item.silver .p-block { height:64px; font-size:20px; background:linear-gradient(180deg,#C0C0C0,#808080); color:#2a2a2a; }
.p-item.bronze .p-block { height:42px; font-size:18px; background:linear-gradient(180deg,#E8A96A,#8B4513); color:#2a1a00; }

/* CHIPS */
.chip { display:inline-flex; align-items:center; gap:2px; padding:2px 7px; border-radius:12px; font-size:11px; margin:1px; font-family:'Cinzel',serif; }
.chip.trophy { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25); color:#fff; }
.chip.gold-c { background:rgba(200,50,0,0.15); border:1px solid rgba(200,50,0,0.4); color:var(--ember); }
.chip.silver-c { background:rgba(192,192,192,0.1); border:1px solid rgba(192,192,192,0.3); color:#C0C0C0; }
.chip.bronze-c { background:rgba(205,127,50,0.1); border:1px solid rgba(205,127,50,0.3); color:#E8A96A; }

/* SEARCH RESULTS */
.search-results { background:var(--stone2); border:1px solid var(--iron); border-radius:8px; overflow:hidden; margin-bottom:14px; }
.search-player-header { background:rgba(139,0,0,0.3); padding:12px 20px; font-family:'Cinzel Decorative',cursive; font-size:14px; color:var(--gold-light); border-bottom:1px solid var(--iron); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.search-war { padding:10px 20px; border-bottom:1px solid rgba(255,255,255,0.04); }
.search-war:last-child { border-bottom:none; }
.search-war-name { font-size:11px; color:var(--parchment-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.search-stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.search-stat-label { font-size:9px; color:var(--parchment-dim); text-transform:uppercase; letter-spacing:1px; }
.search-stat-value { font-family:'Cinzel',serif; font-size:14px; color:var(--parchment); font-weight:600; margin-top:2px; }
.search-total-row { padding:10px 20px; background:rgba(139,0,0,0.15); border-top:1px solid var(--iron); }
.search-total-row .search-war-name { color:var(--gold-light); font-weight:600; }
.search-total-row .search-stat-value { color:var(--ember); }

/* LOADING */
.loading { text-align:center; padding:80px; color:var(--parchment-dim); letter-spacing:3px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
@media (max-width:600px) { main{padding:14px;} .search-stats-grid{grid-template-columns:repeat(2,1fr);} .podium{gap:6px;} }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-title">&#9876; Hall of War &#9876;</div>
  <div class="site-sub">Gloire aux guerriers sans merci</div>
</header>

<div id="annonce-bar">
  <div id="annonce-inner">
    <span>&#128226;</span>
    <p id="annonce-text"></p>
  </div>
</div>

<nav id="nav">
  <button class="nav-arrow-btn" id="nav-left" onclick="document.getElementById('nav-scroll-area').scrollLeft-=160">&#8249;</button>
  <div class="nav-scroll-area" id="nav-scroll-area"></div>
  <div class="nav-wars-dropdown" id="nav-wars-dropdown">
    <button class="nav-wars-btn" onclick="document.getElementById('nav-wars-list').classList.toggle('open')">&#9660; Guerres</button>
    <div class="nav-wars-list" id="nav-wars-list"></div>
  </div>
  <div class="nav-scroll-area" id="nav-scroll-area-right"></div>
  <button class="nav-arrow-btn right" onclick="document.getElementById('nav-scroll-area').scrollLeft+=160">&#8250;</button>
</nav>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="Rechercher un guerrier..." oninput="searchPlayer(this.value)">
</div>
<div id="search-panel"></div>

<main id="main-content">
  <div class="loading">Chargement des archives de guerre...</div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwu1KbMpF1vRhY1gKqMZ8yN492b7oQ7FwLX4q0Sf2Kw-c3ptDeTadaEH5qITosaDJ5RBQ/exec";
let globalData = null;
let sortState = {};

function fmt(n) {
  if (n === '' || n === null || n === undefined) return '\u2014';
  var num;
  if (typeof n === 'number') { num = Math.ceil(n); }
  else {
    var s = n.toString().replace(/\s/g,'').replace(',','.');
    var p = parseFloat(s);
    if (!isNaN(p)) num = Math.ceil(p);
    else return n;
  }
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0');
}

function calcScore(m) {
  if (!m) return 0;
  return (m.match(/\uD83C\uDFC6/g)||[]).length + (m.match(/\uD83E\uDD47/g)||[]).length*5 + (m.match(/\uD83E\uDD48/g)||[]).length*3 + (m.match(/\uD83E\uDD49/g)||[]).length;
}

function chips(m) {
  if (!m) return '';
  var t=(m.match(/\uD83C\uDFC6/g)||[]).length;
  var o=(m.match(/\uD83E\uDD47/g)||[]).length;
  var a=(m.match(/\uD83E\uDD48/g)||[]).length;
  var b=(m.match(/\uD83E\uDD49/g)||[]).length;
  var out='';
  if(t>0) out+='<span class="chip trophy">\uD83C\uDFC6 '+t+'</span>';
  if(o>0) out+='<span class="chip gold-c">\uD83E\uDD47 '+o+'</span>';
  if(a>0) out+='<span class="chip silver-c">\uD83E\uDD48 '+a+'</span>';
  if(b>0) out+='<span class="chip bronze-c">\uD83E\uDD49 '+b+'</span>';
  return out;
}

function initial(n) { return n ? n.charAt(0).toUpperCase() : '?'; }

function showPage(id) {
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.page===id); });
  document.querySelectorAll('#nav-wars-list button').forEach(function(b){ b.classList.toggle('active', b.dataset.page===id); });
  document.querySelectorAll('.page').forEach(function(p){ p.classList.toggle('active', p.id==='page-'+id); });
  document.getElementById('search-input').value='';
  document.getElementById('search-panel').style.display='none';
  document.getElementById('nav-wars-list').classList.remove('open');
}

function buildNav(data) {
  var scrollArea = document.getElementById('nav-scroll-area');
  var warsList = document.getElementById('nav-wars-list');
  var mainPages = [
    {id:'hof', label:'\uD83C\uDFC6 Hall of War'},
    {id:'total', label:'\uD83D\uDCCA Total'},
    {id:'explications', label:'\uD83D\uDCD6 Explications'},
    {id:'comparaison', label:'\u2694 Comparaison'},
  ];
  scrollArea.innerHTML = mainPages.map(function(p,i){
    var active = p.id==='hof' ? ' active' : '';
    var sep = i<mainPages.length-1 ? '<span class="nav-sep">|</span>' : '';
    return '<button class="nav-btn'+active+'" onclick="showPage(\''+p.id+'\')" data-page="'+p.id+'">'+p.label+'</button>'+sep;
  }).join('');
  warsList.innerHTML = data.guerres.map(function(g,i){
    return '<button onclick="showPage(\'guerre_'+i+'\')" data-page="guerre_'+i+'">\u2694 '+g.nom+'</button>';
  }).join('');
  document.addEventListener('click', function(e){
    if(!e.target.closest('#nav-wars-dropdown')) warsList.classList.remove('open');
  });
}

function renderAll(data) {
  globalData = data;
  buildNav(data);
  if (data.annonce && data.annonce.trim()) {
    document.getElementById('annonce-text').textContent = data.annonce;
    document.getElementById('annonce-bar').style.display = 'block';
  }
  var html = '';
  html += '<div class="page active" id="page-hof">'+renderHoF(data.hof)+'</div>';
  html += '<div class="page" id="page-total">'+renderFeuille(data.total, true)+'</div>';
  html += '<div class="page" id="page-explications">'+renderExplications()+'</div>';
  data.guerres.forEach(function(g,i){
    html += '<div class="page" id="page-guerre_'+i+'">'+renderFeuille(g,false)+'</div>';
  });
  html += '<div class="page" id="page-comparaison">'+renderComparaison(data)+'</div>';
  document.getElementById('main-content').innerHTML = html;
}

function renderHoF(hof) {
  if (!hof || !hof.length) return '<div class="loading">Aucune donn\u00e9e</div>';
  var sorted = hof.slice().sort(function(a,b){ return calcScore(b.medailles)-calcScore(a.medailles); });
  var top3=sorted.slice(0,3), rest=sorted.slice(3);
  var podOrder=[{i:1,c:'silver',l:'2',b:'\uD83E\uDD48'},{i:0,c:'gold',l:'1',b:'\uD83E\uDD47'},{i:2,c:'bronze',l:'3',b:'\uD83E\uDD49'}];
  var pod='<div class="section-title">Classement des Guerriers</div><div class="podium">';
  podOrder.forEach(function(x){
    var p=top3[x.i]; if(!p) return;
    pod+='<div class="p-item '+x.c+'"><div class="p-avatar">'+initial(p.nom)+'<span class="p-badge">'+x.b+'</span></div><div class="p-name">'+p.nom+'</div><div class="p-medals">'+chips(p.medailles)+'</div><div class="p-score">'+calcScore(p.medailles)+' pts</div><div class="p-block">'+x.l+'</div></div>';
  });
  pod+='</div>';
  var rows='';
  rest.forEach(function(p,i){
    var rank = i+4;
    rows+='<tr><td class="name-cell"><span style="font-family:Cinzel,serif;font-size:11px;color:var(--parchment-dim);margin-right:10px;min-width:28px;display:inline-block;">'+rank+'e</span>'+p.nom+'</td><td>'+chips(p.medailles)+'</td><td class="num">'+calcScore(p.medailles)+' pts</td></tr>';
  });
  return pod+'<div class="table-wrap"><table><thead><tr><th>Guerrier</th><th>Distinctions</th><th>Points</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderFeuille(f, isTotal) {
  if (!f) return '<div class="loading">Aucune donn\u00e9e</div>';
  var html='<div class="section-title">'+(isTotal?'\uD83D\uDCCA ':'\u2694 ')+f.nom+'</div>';
  var hasInfoGen=f.infoGenerales&&Object.keys(f.infoGenerales).length;
  var hasInfos=f.infos&&Object.keys(f.infos).length;
  var hasMerc=f.mercenaires&&Object.keys(f.mercenaires).length;
  if (hasInfoGen||hasInfos||hasMerc) {
    html+='<div class="info-grid">';
    if(hasInfoGen){ html+='<div class="info-card"><div class="info-card-title">Informations G\u00e9n\u00e9rales</div>'; Object.keys(f.infoGenerales).forEach(function(k){ html+='<div class="info-row"><span class="info-label">'+k+'</span><span class="info-value'+(k.toLowerCase().includes('dur')?' highlight':'')+'">'+( f.infoGenerales[k]||'\u2014')+'</span></div>'; }); html+='</div>'; }
    if(hasInfos){ html+='<div class="info-card"><div class="info-card-title">Informations</div>'; Object.keys(f.infos).forEach(function(k){ html+='<div class="info-row"><span class="info-label">'+k+'</span><span class="info-value">'+(f.infos[k]||'\u2014')+'</span></div>'; }); html+='</div>'; }
    if(hasMerc){ html+='<div class="info-card"><div class="info-card-title">Mercenaires</div>'; Object.keys(f.mercenaires).forEach(function(k){ html+='<div class="info-row"><span class="info-label">'+k+'</span><span class="info-value">'+(f.mercenaires[k]||'\u2014')+'</span></div>'; }); html+='</div>'; }
    html+='</div>';
  }
  if (f.joueurs&&f.joueurs.length) {
    var tid='tbl_'+f.nom.replace(/\W/g,'_');
    html+='<div class="table-wrap"><table id="'+tid+'"><thead><tr>'
      +'<th onclick="sortTable(\''+tid+'\',0)">Guerrier</th>'
      +'<th onclick="sortTable(\''+tid+'\',1)">'+(isTotal?'Troph\u00e9es':'M\u00e9dailles')+'</th>'
      +'<th onclick="sortTable(\''+tid+'\',2)">Nbr. Atq</th>'
      +'<th onclick="sortTable(\''+tid+'\',3)">Nbr. D\u00e9f</th>'
      +'<th onclick="sortTable(\''+tid+'\',4)">Nbr. Tu\u00e9</th>'
      +'<th onclick="sortTable(\''+tid+'\',5)">Cl. Tu\u00e9</th>'
      +'<th onclick="sortTable(\''+tid+'\',6)">Trp. Perdue</th>'
      +'<th onclick="sortTable(\''+tid+'\',7)">Tu\u00e9/Perte</th>'
      +'<th onclick="sortTable(\''+tid+'\',8)">Cl. T/P</th>'
      +'<th onclick="sortTable(\''+tid+'\',9)">Tu\u00e9/A&amp;D</th>'
      +'<th onclick="sortTable(\''+tid+'\',10)">Cl. A&amp;D</th>'
      +'</tr></thead><tbody>';
    f.joueurs.forEach(function(j){
      var c1=j.classement_tue==1?'rank-1':j.classement_tue==2?'rank-2':j.classement_tue==3?'rank-3':'';
      var c2=j.classement_tp==1?'rank-1':j.classement_tp==2?'rank-2':j.classement_tp==3?'rank-3':'';
      var c3=j.classement_aad==1?'rank-1':j.classement_aad==2?'rank-2':j.classement_aad==3?'rank-3':'';
      html+='<tr><td class="name-cell">'+j.nom+'</td><td>'+chips(j.medailles)+'</td><td class="num">'+fmt(j.nbr_atq)+'</td><td class="num">'+fmt(j.nbr_def)+'</td><td class="num">'+fmt(j.nbr_tue)+'</td><td class="num '+c1+'">'+fmt(j.classement_tue)+'</td><td class="num">'+fmt(j.trp_perdue)+'</td><td class="num">'+fmt(j.ratio_tp)+'</td><td class="num '+c2+'">'+fmt(j.classement_tp)+'</td><td class="num">'+fmt(j.tue_aad)+'</td><td class="num '+c3+'">'+fmt(j.classement_aad)+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  return html;
}

function renderComparaison(data) {
  if (!data.total || !data.total.joueurs || !data.total.joueurs.length) return '<div class="loading">Aucune donnée dans le Total</div>';
  var joueurs = data.total.joueurs.map(function(j){ return j.nom; }).sort();
  var opts = joueurs.map(function(n){ return '<option value="'+n+'">'; }).join('');
  var inputStyle = 'width:100%;background:var(--stone2);border:1px solid var(--iron);border-radius:6px;color:var(--parchment);font-family:Inter,sans-serif;font-size:14px;padding:9px 12px;outline:none;';
  return '<div class="section-title">Comparaison de Guerriers</div>'
    +'<datalist id="cmp-list">'+opts+'</datalist>'
    +'<div style="display:flex;gap:16px;align-items:center;margin-bottom:24px;flex-wrap:wrap;">'
    +'<div style="flex:1;min-width:180px;">'
    +'<div style="font-size:11px;color:var(--parchment-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;">Guerrier 1</div>'
    +'<input id="cmp-p1" list="cmp-list" placeholder="Taper un pseudo..." oninput="doComparaison()" style="'+inputStyle+'"></div>'
    +'<div style="font-family:Cinzel,serif;font-size:20px;color:var(--parchment-dim);padding-top:18px;">VS</div>'
    +'<div style="flex:1;min-width:180px;">'
    +'<div style="font-size:11px;color:var(--parchment-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;">Guerrier 2</div>'
    +'<input id="cmp-p2" list="cmp-list" placeholder="Taper un pseudo..." oninput="doComparaison()" style="'+inputStyle+'"></div>'
    +'</div>'
    +'<div id="cmp-result"></div>';
}

function doComparaison() {
  var n1 = document.getElementById('cmp-p1').value.trim();
  var n2 = document.getElementById('cmp-p2').value.trim();
  var result = document.getElementById('cmp-result');
  if (!n1 || !n2) { result.innerHTML=''; return; }
  if (n1 === n2) { result.innerHTML='<div class="loading" style="padding:20px;">Sélectionne deux guerriers différents.</div>'; return; }

  var joueurs = globalData.total.joueurs;
  var j1 = joueurs.find(function(j){ return j.nom.toLowerCase()===n1.toLowerCase(); });
  var j2 = joueurs.find(function(j){ return j.nom.toLowerCase()===n2.toLowerCase(); });
  if (!j1||!j2) { result.innerHTML=''; return; }

  var hof1 = globalData.hof ? globalData.hof.find(function(p){ return p.nom===n1; }) : null;
  var hof2 = globalData.hof ? globalData.hof.find(function(p){ return p.nom===n2; }) : null;

  var stats = [
    {label:'Troupes tuées', v1:j1.nbr_tue, v2:j2.nbr_tue, higher:'higher'},
    {label:'Troupes perdues', v1:j1.trp_perdue, v2:j2.trp_perdue, higher:'lower'},
    {label:'Nbr. Attaques', v1:j1.nbr_atq, v2:j2.nbr_atq, higher:'higher'},
    {label:'Nbr. Défenses', v1:j1.nbr_def, v2:j2.nbr_def, higher:'higher'},
    {label:'Tué / Perte', v1:parseFloat(j1.ratio_tp)||0, v2:parseFloat(j2.ratio_tp)||0, higher:'higher'},
    {label:'Tué / A&amp;D', v1:j1.tue_aad, v2:j2.tue_aad, higher:'higher'},
    {label:'Points HoF', v1:hof1?calcScore(hof1.medailles):0, v2:hof2?calcScore(hof2.medailles):0, higher:'higher'},
  ];

  var wins1=0, wins2=0;
  var rows = stats.map(function(s){
    var better1 = s.higher==='higher' ? s.v1>s.v2 : s.v1<s.v2;
    var better2 = s.higher==='higher' ? s.v2>s.v1 : s.v2<s.v1;
    if(better1) wins1++; else if(better2) wins2++;
    var col1 = better1 ? '#4CAF50' : better2 ? 'var(--parchment-dim)' : 'var(--parchment)';
    var col2 = better2 ? '#4CAF50' : better1 ? 'var(--parchment-dim)' : 'var(--parchment)';
    var disp1 = s.label==='Points HoF'?s.v1.toString():fmt(s.v1);
    var disp2 = s.label==='Points HoF'?s.v2.toString():fmt(s.v2);
    return '<tr>'
      +'<td class="num" style="text-align:right;color:'+col1+';font-weight:'+(better1?'700':'400')+';">'+disp1+'</td>'
      +'<td style="text-align:center;font-family:Cinzel,serif;font-size:11px;color:var(--parchment-dim);padding:9px 16px;">'+s.label+'</td>'
      +'<td class="num" style="color:'+col2+';font-weight:'+(better2?'700':'400')+';">'+disp2+'</td>'
      +'</tr>';
  }).join('');

  var score1col = wins1>wins2?'#4CAF50':'var(--parchment-dim)';
  var score2col = wins2>wins1?'#4CAF50':'var(--parchment-dim)';

  result.innerHTML = '<div class="table-wrap"><table>'
    +'<thead><tr>'
    +'<th style="text-align:right;font-size:14px;color:var(--ember);">'+n1+'</th>'
    +'<th style="text-align:center;width:200px;"></th>'
    +'<th style="font-size:14px;color:var(--ember);">'+n2+'</th>'
    +'</tr>'
    +'<tr style="background:rgba(139,0,0,0.2);">'
    +'<th style="text-align:right;color:'+score1col+';font-size:13px;">'+wins1+' victoires</th>'
    +'<th style="text-align:center;color:var(--parchment-dim);font-size:11px;">Bilan</th>'
    +'<th style="color:'+score2col+';font-size:13px;">'+wins2+' victoires</th>'
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table></div>';
}

function sortTable(tid, col) {
  var table=document.getElementById(tid); if(!table) return;
  var key=tid+'_'+col, asc=sortState[key]!==true;
  sortState[key]=asc;
  table.querySelectorAll('th').forEach(function(th,i){ th.classList.remove('sorted-asc','sorted-desc'); if(i===col) th.classList.add(asc?'sorted-asc':'sorted-desc'); });
  var tbody=table.querySelector('tbody');
  var rows=Array.from(tbody.querySelectorAll('tr'));
  rows.sort(function(a,b){
    var va=a.cells[col]?a.cells[col].textContent.trim():'';
    var vb=b.cells[col]?b.cells[col].textContent.trim():'';
    var skipA=va==='\u2014'||va.toLowerCase().includes('pas class')||va.toLowerCase().includes('aucun')||va==='';
    var skipB=vb==='\u2014'||vb.toLowerCase().includes('pas class')||vb.toLowerCase().includes('aucun')||vb==='';
    if(skipA&&skipB) return 0; if(skipA) return 1; if(skipB) return -1;
    var na=parseFloat(va.replace(/\u00a0/g,'').replace(/[^\d.-]/g,'')), nb=parseFloat(vb.replace(/\u00a0/g,'').replace(/[^\d.-]/g,''));
    if(!isNaN(na)&&!isNaN(nb)) return asc?na-nb:nb-na;
    return asc?va.localeCompare(vb):vb.localeCompare(va);
  });
  rows.forEach(function(r){ tbody.appendChild(r); });
}

function searchPlayer(query) {
  var panel=document.getElementById('search-panel');
  if (!query.trim()||!globalData) { panel.style.display='none'; return; }
  var q=query.toLowerCase().trim();
  var matches=new Set();
  globalData.guerres.forEach(function(g){ g.joueurs.forEach(function(j){ if(j.nom.toLowerCase().includes(q)) matches.add(j.nom); }); });
  if(globalData.total) globalData.total.joueurs.forEach(function(j){ if(j.nom.toLowerCase().includes(q)) matches.add(j.nom); });
  if(!matches.size) { panel.style.display='block'; panel.innerHTML='<div class="search-results"><div class="search-player-header">Aucun guerrier trouv\u00e9</div></div>'; return; }
  var html='';
  matches.forEach(function(nom){
    var totTue=0,totPerte=0,totAad=0,ratioSum=0,ratioCount=0,warRows='';
    globalData.guerres.forEach(function(g){
      var j=g.joueurs.find(function(p){ return p.nom===nom; }); if(!j) return;
      totTue+=j.nbr_tue||0; totPerte+=j.trp_perdue||0; totAad+=j.tue_aad||0;
      var r=j.ratio_tp&&j.ratio_tp!=='Aucun'&&j.ratio_tp!==''?parseFloat(j.ratio_tp):null;
      if(r!==null&&!isNaN(r)){ ratioSum+=r; ratioCount++; }
      warRows+='<div class="search-war"><div class="search-war-name">\u2694 '+g.nom+'</div>'
        +'<div class="search-stats-grid">'
        +'<div><div class="search-stat-label">Troupes tu\u00e9es</div><div class="search-stat-value">'+fmt(j.nbr_tue)+'</div></div>'
        +'<div><div class="search-stat-label">Trp. perdues</div><div class="search-stat-value">'+fmt(j.trp_perdue)+'</div></div>'
        +'<div><div class="search-stat-label">Tu\u00e9/Perte</div><div class="search-stat-value">'+(r!==null?fmt(r):'N/A')+'</div></div>'
        +'<div><div class="search-stat-label">Tu\u00e9/A&amp;D</div><div class="search-stat-value">'+fmt(j.tue_aad)+'</div></div>'
        +'</div></div>';
    });
    var hofEntry=globalData.hof?globalData.hof.find(function(p){ return p.nom===nom; }):null;
    var ratioMoy=ratioCount>0?fmt(ratioSum/ratioCount):'N/A';
    html+='<div class="search-results"><div class="search-player-header">'+nom+(hofEntry?' '+chips(hofEntry.medailles):'')+'</div>'
      +warRows
      +'<div class="search-total-row"><div class="search-war-name">TOTAL</div>'
      +'<div class="search-stats-grid">'
      +'<div><div class="search-stat-label">Troupes tu\u00e9es</div><div class="search-stat-value">'+fmt(totTue)+'</div></div>'
      +'<div><div class="search-stat-label">Trp. perdues</div><div class="search-stat-value">'+fmt(totPerte)+'</div></div>'
      +'<div><div class="search-stat-label">Tu\u00e9/Perte moy.</div><div class="search-stat-value">'+ratioMoy+'</div></div>'
      +'<div><div class="search-stat-label">Tu\u00e9/A&amp;D</div><div class="search-stat-value">'+fmt(totAad)+'</div></div>'
      +'</div></div></div>';
  });
  panel.style.display='block';
  panel.innerHTML=html;
}
