<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercenaires — Hall of War</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --blood: #8B0000;
  --fire: #CC3300;
  --ember: #FF6633;
  --gold: #C8960C;
  --gold-light: #FFD700;
  --stone: #0d0a08;
  --stone2: #1a1208;
  --stone3: #241808;
  --parchment: #f0e6cc;
  --parchment-dim: #a08060;
  --iron: #3a3020;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--stone); color:var(--parchment); font-family:'IM Fell English',serif; min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse at 20% 0%, rgba(139,0,0,0.12) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 100%, rgba(200,50,0,0.08) 0%, transparent 50%);
}
.site-header { position:relative; z-index:10; text-align:center; padding:36px 20px 18px; border-bottom:2px solid var(--blood); background:linear-gradient(180deg,rgba(139,0,0,0.2) 0%,transparent 100%); }
.site-header::before { content:'⚔'; position:absolute; left:30px; top:50%; transform:translateY(-50%); font-size:32px; opacity:0.3; }
.site-header::after { content:'⚔'; position:absolute; right:30px; top:50%; transform:translateY(-50%) scaleX(-1); font-size:32px; opacity:0.3; }
.site-title { font-family:'Cinzel Decorative',cursive; font-size:clamp(20px,4vw,40px); font-weight:900; color:var(--fire); letter-spacing:4px; text-shadow:0 0 30px rgba(200,50,0,0.4); }
.site-sub { font-family:'Cinzel',serif; font-size:11px; color:var(--parchment-dim); letter-spacing:6px; margin-top:6px; font-style:italic; }
#annonce-bar { display:none; position:relative; z-index:5; background:linear-gradient(135deg,rgba(139,0,0,0.35),rgba(200,50,0,0.15)); border-bottom:1px solid var(--blood); }
#annonce-inner { max-width:1200px; margin:0 auto; padding:10px 24px; display:flex; align-items:center; justify-content:center; gap:10px; text-align:center; }
#annonce-icon { font-size:16px; flex-shrink:0; margin-top:2px; }
#annonce-text { font-family:'IM Fell English',serif; font-size:14px; color:var(--parchment); line-height:1.6; font-style:italic; }
nav { position:sticky; top:0; z-index:100; background:var(--stone2); border-bottom:1px solid var(--iron); padding:0 16px; display:flex; align-items:center; overflow-x:auto; scrollbar-width:none; }
nav::-webkit-scrollbar { display:none; }
.nav-btn { font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:1px; color:var(--parchment-dim); background:none; border:none; border-bottom:2px solid transparent; padding:13px 14px; cursor:pointer; white-space:nowrap; transition:color 0.2s,border-color 0.2s; text-transform:uppercase; }
.nav-btn:hover { color:var(--parchment); }
.nav-btn.active { color:var(--ember); border-bottom-color:var(--fire); }
.nav-sep { color:var(--iron); padding:0 2px; font-size:10px; flex-shrink:0; }
.search-wrap { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:20px 24px 0; }
.search-wrap input { width:100%; max-width:460px; background:var(--stone2); border:1px solid var(--iron); border-radius:6px; color:var(--parchment); font-family:'Cinzel',serif; font-size:13px; padding:10px 16px 10px 36px; outline:none; transition:border-color 0.2s; }
.search-wrap input:focus { border-color:var(--fire); }
.search-wrap input::placeholder { color:var(--parchment-dim); }
.search-wrap::before { content:'🔍'; position:absolute; left:36px; top:30px; font-size:13px; opacity:0.5; pointer-events:none; }
#search-panel { display:none; position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:12px 24px; }
main { position:relative; z-index:1; padding:24px; max-width:1200px; margin:0 auto; }
.page { display:none; }
.page.active { display:block; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.section-title { font-family:'Cinzel Decorative',cursive; font-size:clamp(14px,2vw,20px); color:var(--gold-light); letter-spacing:3px; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid var(--iron); display:flex; align-items:center; gap:10px; }
.section-title::before { content:'⚔'; font-size:16px; opacity:0.5; }
.info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin-bottom:24px; }
.info-card { background:var(--stone2); border:1px solid var(--iron); border-radius:8px; overflow:hidden; }
.info-card-title { font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; text-align:center; padding:9px; background:rgba(139,0,0,0.3); border-bottom:1px solid var(--iron); color:var(--gold-light); }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:7px 14px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:13px; gap:10px; }
.info-row:last-child { border-bottom:none; }
.info-label { color:var(--parchment-dim); font-style:italic; flex-shrink:0; }
.info-value { color:var(--parchment); font-weight:600; font-family:'Cinzel',serif; font-size:12px; text-align:right; }
.info-value.highlight { color:var(--ember); }
.table-wrap { overflow-x:auto; border-radius:8px; border:1px solid var(--iron); margin-bottom:24px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { background:rgba(139,0,0,0.4); }
th { font-family:'Cinzel',serif; font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--gold-light); padding:10px 12px; text-align:left; cursor:pointer; white-space:nowrap; user-select:none; border-bottom:1px solid var(--iron); transition:background 0.15s; }
th:hover { background:rgba(200,50,0,0.2); }
th.sorted-asc::after { content:' ↑'; color:var(--ember); }
th.sorted-desc::after { content:' ↓'; color:var(--ember); }
tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:background 0.15s; }
tbody tr:hover { background:rgba(255,255,255,0.03); }
td { padding:9px 12px; color:var(--parchment); vertical-align:middle; }
td.num { font-family:'Cinzel',serif; font-size:12px; color:var(--parchment-dim); }
td.rank-1 { color:var(--gold-light); font-weight:700; }
td.rank-2 { color:#C0C0C0; }
td.rank-3 { color:var(--ember); }
td.name-cell { font-family:'Cinzel',serif; font-size:13px; font-weight:600; }
.podium { display:flex; align-items:flex-end; justify-content:center; gap:10px; margin-bottom:36px; }
.p-item { display:flex; flex-direction:column; align-items:center; flex:1; max-width:250px; }
.p-avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel Decorative',cursive; font-weight:900; margin-bottom:8px; position:relative; }
.p-item.gold .p-avatar { width:82px; height:82px; font-size:28px; background:radial-gradient(circle at 30% 30%,#ff8855,#CC3300,#8B0000); color:#f0e6cc; box-shadow:0 0 28px rgba(200,50,0,0.6); }
.p-item.silver .p-avatar { width:66px; height:66px; font-size:22px; background:radial-gradient(circle at 30% 30%,#E8E8E8,#C0C0C0,#808080); color:#2a2a2a; }
.p-item.bronze .p-avatar { width:66px; height:66px; font-size:22px; background:radial-gradient(circle at 30% 30%,#E8A96A,#CD7F32,#8B4513); color:#2a1a00; }
.p-badge { position:absolute; top:-6px; right:-6px; font-size:16px; }
.p-name { font-family:'Cinzel',serif; font-size:13px; font-weight:600; letter-spacing:2px; margin-bottom:4px; text-align:center; }
.p-item.gold .p-name { font-size:15px; color:#FF6633; }
.p-item.silver .p-name { color:#C0C0C0; }
.p-item.bronze .p-name { color:#E8A96A; }
.p-medals { display:flex; flex-wrap:wrap; justify-content:center; gap:2px; margin-bottom:4px; min-height:24px; }
.p-score { font-size:11px; color:var(--parchment-dim); margin-bottom:7px; font-family:'Cinzel',serif; }
.p-item.gold .p-score { color:var(--ember); font-weight:600; }
.p-block { width:100%; border-radius:6px 6px 0 0; display:flex; align-items:center; justify-content:center; font-family:'Cinzel Decorative',cursive; font-weight:900; }
.p-item.gold .p-block { height:100px; font-size:24px; background:linear-gradient(180deg,#CC3300,#8B0000); color:#f0e6cc; box-shadow:0 -4px 20px rgba(200,50,0,0.3); }
.p-item.silver .p-block { height:66px; font-size:20px; background:linear-gradient(180deg,#C0C0C0,#808080); color:#2a2a2a; }
.p-item.bronze .p-block { height:44px; font-size:18px; background:linear-gradient(180deg,#E8A96A,#8B4513); color:#2a1a00; }
.chip { display:inline-flex; align-items:center; gap:2px; padding:2px 7px; border-radius:12px; font-size:11px; margin:1px; font-family:'Cinzel',serif; }
.chip.trophy { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25); color:#fff; }
.chip.gold-c { background:rgba(200,50,0,0.15); border:1px solid rgba(200,50,0,0.4); color:var(--ember); }
.chip.silver-c { background:rgba(192,192,192,0.1); border:1px solid rgba(192,192,192,0.3); color:#C0C0C0; }
.chip.bronze-c { background:rgba(205,127,50,0.1); border:1px solid rgba(205,127,50,0.3); color:#E8A96A; }
.search-results { background:var(--stone2); border:1px solid var(--iron); border-radius:8px; overflow:hidden; margin-bottom:16px; }
.search-player-header { background:rgba(139,0,0,0.3); padding:12px 20px; font-family:'Cinzel Decorative',cursive; font-size:15px; color:var(--gold-light); border-bottom:1px solid var(--iron); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.search-war { padding:10px 20px; border-bottom:1px solid rgba(255,255,255,0.04); }
.search-war:last-child { border-bottom:none; }
.search-war-name { font-family:'Cinzel',serif; font-size:11px; color:var(--parchment-dim); margin-bottom:6px; }
.search-stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.search-stat { text-align:center; }
.search-stat-label { font-family:'Cinzel',serif; font-size:9px; color:var(--parchment-dim); text-transform:uppercase; letter-spacing:1px; }
.search-stat-value { font-family:'Cinzel',serif; font-size:14px; color:var(--parchment); font-weight:600; margin-top:2px; }
.search-total-row { padding:10px 20px; background:rgba(139,0,0,0.15); border-top:1px solid var(--iron); }
.search-total-row .search-war-name { color:var(--gold-light); font-weight:600; margin-bottom:6px; }
.search-total-row .search-stat-value { color:var(--ember); }
.loading { text-align:center; padding:80px; color:var(--parchment-dim); font-style:italic; letter-spacing:3px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }


@media (max-width:600px) { main{padding:14px;} .search-stats-grid{grid-template-columns:repeat(2,1fr);} .podium{gap:6px;} }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title">&#9876; Hall of War &#9876;</div>
  <div class="site-sub">Gloire aux guerriers sans merci</div>
</header>

<div id="annonce-bar">
  <div id="annonce-inner">
    <span id="annonce-icon">&#128226;</span>
    <p id="annonce-text"></p>
  </div>
</div>

<nav id="nav"></nav>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="Rechercher un guerrier..." oninput="searchPlayer(this.value)">
</div>
<div id="search-panel"></div>

<main id="main-content">
  <div class="loading">Chargement des archives de guerre...</div>
</main>



<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwu1KbMpF1vRhY1gKqMZ8yN492b7oQ7FwLX4q0Sf2Kw-c3ptDeTadaEH5qITosaDJ5RBQ/exec";
let globalData = null;
let sortState = {};

function fmt(n) {
  if (n === '' || n === null || n === undefined) return '\u2014';
  var num;
  if (typeof n === 'number') { num = Math.ceil(n); }
  else {
    var s = n.toString().replace(/\s/g,'').replace(',','.');
    var p = parseFloat(s);
    if (!isNaN(p)) num = Math.ceil(p);
    else return n;
  }
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0');
}

function calcScore(m) {
  if (!m) return 0;
  return (m.match(/\uD83C\uDFC6/g)||[]).length + (m.match(/\uD83E\uDD47/g)||[]).length*5 + (m.match(/\uD83E\uDD48/g)||[]).length*3 + (m.match(/\uD83E\uDD49/g)||[]).length;
}

function chips(m) {
  if (!m) return '';
  const t=(m.match(/\uD83C\uDFC6/g)||[]).length;
  const o=(m.match(/\uD83E\uDD47/g)||[]).length;
  const a=(m.match(/\uD83E\uDD48/g)||[]).length;
  const b=(m.match(/\uD83E\uDD49/g)||[]).length;
  let out='';
  if(t>0) out+='<span class="chip trophy">\uD83C\uDFC6 '+t+'</span>';
  if(o>0) out+='<span class="chip gold-c">\uD83E\uDD47 '+o+'</span>';
  if(a>0) out+='<span class="chip silver-c">\uD83E\uDD48 '+a+'</span>';
  if(b>0) out+='<span class="chip bronze-c">\uD83E\uDD49 '+b+'</span>';
  return out;
}

function initial(n) { return n ? n.charAt(0).toUpperCase() : '?'; }

function buildNav(data) {
  const nav = document.getElementById('nav');
  const pages = [
    {id:'hof', label:'\uD83C\uDFC6 Hall of War'},
    {id:'total', label:'\uD83D\uDCCA Total'},
    {id:'explications', label:'\uD83D\uDCD6 Explications'},
  ];
  data.guerres.forEach(function(g,i){ pages.push({id:'guerre_'+i, label:'\u2694 '+g.nom}); });
  nav.innerHTML = pages.map(function(p,i){
    return '<button class="nav-btn'+(p.id==='hof'?' active':'')+'" onclick="showPage(\''+p.id+'\')" data-page="'+p.id+'">'+p.label+'</button>'+(i<pages.length-1?'<span class="nav-sep">\u2502</span>':'');
  }).join('');
}

function showPage(id) {
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.page===id); });
  document.querySelectorAll('.page').forEach(function(p){ p.classList.toggle('active', p.id==='page-'+id); });
  document.getElementById('search-input').value = '';
  document.getElementById('search-panel').style.display = 'none';
}

function renderAll(data) {
  globalData = data;
  buildNav(data);

  if (data.annonce && data.annonce.trim()) {
    document.getElementById('annonce-text').textContent = data.annonce;
    document.getElementById('annonce-bar').style.display = 'block';
  } else {
    // Annonce vide ou absente - barre masquée
    document.getElementById('annonce-bar').style.display = 'none';
  }

  var html = '';
  html += '<div class="page active" id="page-hof">'+renderHoF(data.hof)+'</div>';
  html += '<div class="page" id="page-total">'+renderFeuille(data.total, true)+'</div>';
  html += '<div class="page" id="page-explications">'+renderExplications()+'</div>';
  data.guerres.forEach(function(g,i){
    html += '<div class="page" id="page-guerre_'+i+'">'+renderFeuille(g, false)+'</div>';
  });

  document.getElementById('main-content').innerHTML = html;
}

function renderHoF(hof) {
  if (!hof || !hof.length) return '<div class="loading">Aucune donn\u00e9e</div>';
  var sorted = hof.slice().sort(function(a,b){ return calcScore(b.medailles)-calcScore(a.medailles); });
  var top3 = sorted.slice(0,3);
  var rest = sorted.slice(3);

  var podOrder = [{i:1,c:'silver',l:'2',b:'\uD83E\uDD48'},{i:0,c:'gold',l:'1',b:'\uD83E\uDD47'},{i:2,c:'bronze',l:'3',b:'\uD83E\uDD49'}];
  var pod = '<div class="section-title">Classement des Guerriers</div><div class="podium">';
  podOrder.forEach(function(x){
    var p = top3[x.i]; if(!p) return;
    pod += '<div class="p-item '+x.c+'">'
      +'<div class="p-avatar">'+initial(p.nom)+'<span class="p-badge">'+x.b+'</span></div>'
      +'<div class="p-name">'+p.nom+'</div>'
      +'<div class="p-medals">'+chips(p.medailles)+'</div>'
      +'<div class="p-score">'+calcScore(p.medailles)+' pts</div>'
      +'<div class="p-block">'+x.l+'</div>'
      +'</div>';
  });
  pod += '</div>';

  var rows = '';
  rest.forEach(function(p){
    rows += '<tr>'
      +'<td class="name-cell">'+p.nom+'</td>'
      +'<td>'+chips(p.medailles)+'</td>'
      +'<td class="num">'+calcScore(p.medailles)+' pts</td>'
      +'</tr>';
  });

  return pod + '<div class="table-wrap"><table><thead><tr><th>Guerrier</th><th>Distinctions</th><th>Points</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderFeuille(f, isTotal) {
  if (!f) return '<div class="loading">Aucune donn\u00e9e</div>';
  var html = '<div class="section-title">'+(isTotal?'\uD83D\uDCCA ':'\u2694 ')+f.nom+'</div>';

  var hasInfoGen = f.infoGenerales && Object.keys(f.infoGenerales).length;
  var hasInfos = f.infos && Object.keys(f.infos).length;
  var hasMerc = f.mercenaires && Object.keys(f.mercenaires).length;

  if (hasInfoGen || hasInfos || hasMerc) {
    html += '<div class="info-grid">';
    if (hasInfoGen) {
      html += '<div class="info-card"><div class="info-card-title">Informations G\u00e9n\u00e9rales</div>';
      Object.keys(f.infoGenerales).forEach(function(k){
        var v = f.infoGenerales[k];
        html += '<div class="info-row"><span class="info-label">'+k+'</span><span class="info-value'+(k.toLowerCase().includes('dur')||k.toLowerCase().includes('nombre')?' highlight':'')+'">'+( v||'\u2014')+'</span></div>';
      });
      html += '</div>';
    }
    if (hasInfos) {
      html += '<div class="info-card"><div class="info-card-title">Informations</div>';
      Object.keys(f.infos).forEach(function(k){
        html += '<div class="info-row"><span class="info-label">'+k+'</span><span class="info-value">'+(f.infos[k]||'\u2014')+'</span></div>';
      });
      html += '</div>';
    }
    if (hasMerc) {
      html += '<div class="info-card"><div class="info-card-title">Mercenaires</div>';
      Object.keys(f.mercenaires).forEach(function(k){
        html += '<div class="info-row"><span class="info-label">'+k+'</span><span class="info-value">'+(f.mercenaires[k]||'\u2014')+'</span></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }

  if (f.joueurs && f.joueurs.length) {
    var tid = 'tbl_'+f.nom.replace(/\W/g,'_');
    html += '<div class="table-wrap"><table id="'+tid+'"><thead><tr>'
      +'<th onclick="sortTable(\''+tid+'\',0)">Guerrier</th>'
      +'<th onclick="sortTable(\''+tid+'\',1)">Troph\u00e9es</th>'
      +'<th onclick="sortTable(\''+tid+'\',2)">Nbr. Atq</th>'
      +'<th onclick="sortTable(\''+tid+'\',3)">Nbr. D\u00e9f</th>'
      +'<th onclick="sortTable(\''+tid+'\',4)">Nbr. Tu\u00e9</th>'
      +'<th onclick="sortTable(\''+tid+'\',5)">Cl. Tu\u00e9</th>'
      +'<th onclick="sortTable(\''+tid+'\',6)">Trp. Perdue</th>'
      +'<th onclick="sortTable(\''+tid+'\',7)">Tu\u00e9/Perte</th>'
      +'<th onclick="sortTable(\''+tid+'\',8)">Cl. T/P</th>'
      +'<th onclick="sortTable(\''+tid+'\',9)">Tu\u00e9/A&amp;D</th>'
      +'<th onclick="sortTable(\''+tid+'\',10)">Cl. A&amp;D</th>'
      +'</tr></thead><tbody>';

    f.joueurs.forEach(function(j){
      var c1 = j.classement_tue==1?'rank-1':j.classement_tue==2?'rank-2':j.classement_tue==3?'rank-3':'';
      var c2 = j.classement_tp==1?'rank-1':j.classement_tp==2?'rank-2':j.classement_tp==3?'rank-3':'';
      var c3 = j.classement_aad==1?'rank-1':j.classement_aad==2?'rank-2':j.classement_aad==3?'rank-3':'';
      html += '<tr>'
        +'<td class="name-cell">'+j.nom+'</td>'
        +'<td>'+chips(j.medailles)+'</td>'
        +'<td class="num">'+fmt(j.nbr_atq)+'</td>'
        +'<td class="num">'+fmt(j.nbr_def)+'</td>'
        +'<td class="num">'+fmt(j.nbr_tue)+'</td>'
        +'<td class="num '+c1+'">'+fmt(j.classement_tue)+'</td>'
        +'<td class="num">'+fmt(j.trp_perdue)+'</td>'
        +'<td class="num">'+fmt(j.ratio_tp)+'</td>'
        +'<td class="num '+c2+'">'+fmt(j.classement_tp)+'</td>'
        +'<td class="num">'+fmt(j.tue_aad)+'</td>'
        +'<td class="num '+c3+'">'+fmt(j.classement_aad)+'</td>'
        +'</tr>';
    });
    html += '</tbody></table></div>';
  }
  return html;
}

function renderExplications() {
  return '<div class="section-title">Guide des Mercenaires</div>'
    +'<div class="info-grid" style="max-width:900px;margin:0 auto 24px auto;">'

    +'<div class="info-card" style="grid-column:1/-1">'

function sortTable(tid, col) {
  var table = document.getElementById(tid);
  if (!table) return;
  var key = tid+'_'+col;
  var asc = sortState[key] !== true;
  sortState[key] = asc;
  table.querySelectorAll('th').forEach(function(th,i){
    th.classList.remove('sorted-asc','sorted-desc');
    if(i===col) th.classList.add(asc?'sorted-asc':'sorted-desc');
  });
  var tbody = table.querySelector('tbody');
  var rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort(function(a,b){
    var va = a.cells[col]?a.cells[col].textContent.trim():'';
    var vb = b.cells[col]?b.cells[col].textContent.trim():'';
    var skipA = va==='—'||va.toLowerCase().includes('pas class')||va.toLowerCase().includes('aucun')||va==='';
    var skipB = vb==='—'||vb.toLowerCase().includes('pas class')||vb.toLowerCase().includes('aucun')||vb==='';
    if(skipA&&skipB) return 0;
    if(skipA) return 1;
    if(skipB) return -1;
    var ca = va.replace(/\u00a0/g,'').replace(/\s/g,'').replace(',','.');
    var cb = vb.replace(/\u00a0/g,'').replace(/\s/g,'').replace(',','.');
    var na = parseFloat(ca.replace(/[^\d.-]/g,'')), nb = parseFloat(cb.replace(/[^\d.-]/g,''));
    if(!isNaN(na)&&!isNaN(nb)) return asc?na-nb:nb-na;
    return asc?va.localeCompare(vb):vb.localeCompare(va);
  });
  rows.forEach(function(r){ tbody.appendChild(r); });
}

function searchPlayer(query) {
  var panel = document.getElementById('search-panel');
  if (!query.trim() || !globalData) { panel.style.display='none'; return; }
  var q = query.toLowerCase().trim();
  var matches = new Set();
  globalData.guerres.forEach(function(g){ g.joueurs.forEach(function(j){ if(j.nom.toLowerCase().includes(q)) matches.add(j.nom); }); });
  if(globalData.total) globalData.total.joueurs.forEach(function(j){ if(j.nom.toLowerCase().includes(q)) matches.add(j.nom); });

  if(!matches.size) {
    panel.style.display='block';
    panel.innerHTML='<div class="search-results"><div class="search-player-header">Aucun guerrier trouv\u00e9</div></div>';
    return;
  }

  var html='';
  matches.forEach(function(nom){
    var totTue=0, totPerte=0, totAad=0, ratioSum=0, ratioCount=0;
    var warRows='';
    globalData.guerres.forEach(function(g){
      var j=g.joueurs.find(function(p){ return p.nom===nom; });
      if(!j) return;
      totTue+=j.nbr_tue||0; totPerte+=j.trp_perdue||0; totAad+=j.tue_aad||0;
      var r=j.ratio_tp&&j.ratio_tp!=='Aucun'&&j.ratio_tp!==''?parseFloat(j.ratio_tp):null;
      if(r!==null&&!isNaN(r)){ ratioSum+=r; ratioCount++; }
      var ratioStr=r!==null?fmt(r):'N/A';
      warRows+='<div class="search-war">'
        +'<div class="search-war-name">\u2694 '+g.nom+'</div>'
        +'<div class="search-stats-grid">'
        +'<div class="search-stat"><div class="search-stat-label">Troupes tu\u00e9es</div><div class="search-stat-value">'+fmt(j.nbr_tue)+'</div></div>'
        +'<div class="search-stat"><div class="search-stat-label">Trp. perdues</div><div class="search-stat-value">'+fmt(j.trp_perdue)+'</div></div>'
        +'<div class="search-stat"><div class="search-stat-label">Tu\u00e9/Perte</div><div class="search-stat-value">'+ratioStr+'</div></div>'
        +'<div class="search-stat"><div class="search-stat-label">Tu\u00e9/A&amp;D</div><div class="search-stat-value">'+fmt(j.tue_aad)+'</div></div>'
        +'</div></div>';
    });
    var hofEntry=globalData.hof?globalData.hof.find(function(p){ return p.nom===nom; }):null;
    var ratioMoy=ratioCount>0?fmt(ratioSum/ratioCount):'N/A';
    html+='<div class="search-results">'
      +'<div class="search-player-header">'+nom+(hofEntry?(' '+chips(hofEntry.medailles)):'')+'</div>'
      +warRows
      +'<div class="search-total-row">'
      +'<div class="search-war-name">TOTAL</div>'
      +'<div class="search-stats-grid">'
      +'<div class="search-stat"><div class="search-stat-label">Troupes tu\u00e9es</div><div class="search-stat-value">'+fmt(totTue)+'</div></div>'
      +'<div class="search-stat"><div class="search-stat-label">Trp. perdues</div><div class="search-stat-value">'+fmt(totPerte)+'</div></div>'
      +'<div class="search-stat"><div class="search-stat-label">Tu\u00e9/Perte moy.</div><div class="search-stat-value">'+ratioMoy+'</div></div>'
      +'<div class="search-stat"><div class="search-stat-label">Tu\u00e9/A&amp;D</div><div class="search-stat-value">'+fmt(totAad)+'</div></div>'
      +'</div></div></div>';
  });
  panel.style.display='block';
  panel.innerHTML=html;
}

function shareLink() {
  var url = window.location.href;
  var text = 'Pour voir les stats des Mercenaires : ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){
      var t=document.createElement('div');
      t.className='toast'; t.textContent='Lien copi\u00e9 !';
      document.body.appendChild(t);
      setTimeout(function(){ t.remove(); }, 2500);
    });
  } else {
    prompt('Copie ce texte :', text);
  }
}
