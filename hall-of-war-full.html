<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercenaires — Hall of War</title>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --blood: #8B0000;
  --fire: #CC3300;
  --ember: #FF6633;
  --gold: #C8960C;
  --gold-light: #FFD700;
  --stone: #1a1510;
  --stone2: #241c14;
  --stone3: #2e2418;
  --parchment: #f0e6cc;
  --parchment-dim: #a08060;
  --iron: #4a4030;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--stone);
  color: var(--parchment);
  font-family: 'IM Fell English', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(139,0,0,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(200,50,0,0.1) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.01) 60px, rgba(255,255,255,0.01) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.01) 60px, rgba(255,255,255,0.01) 61px);
}

/* ─── HEADER ─── */
.site-header {
  position: relative; z-index: 10;
  text-align: center;
  padding: 40px 20px 20px;
  border-bottom: 2px solid var(--blood);
  background: linear-gradient(180deg, rgba(139,0,0,0.2) 0%, transparent 100%);
}

.site-header::before {
  content: '⚔';
  position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
  font-size: 36px; opacity: 0.4;
}
.site-header::after {
  content: '⚔';
  position: absolute; right: 30px; top: 50%; transform: translateY(-50%) scaleX(-1);
  font-size: 36px; opacity: 0.4;
}

.site-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(22px, 4vw, 42px);
  font-weight: 900;
  color: var(--fire);
  letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(200,50,0,0.5);
}

.site-sub {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--parchment-dim);
  letter-spacing: 6px;
  margin-top: 6px;
  font-style: italic;
}

/* ─── NAV ─── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--stone2);
  border-bottom: 1px solid var(--iron);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }

.nav-btn {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--parchment-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 14px 16px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
  text-transform: uppercase;
}
.nav-btn:hover { color: var(--parchment); }
.nav-btn.active { color: var(--ember); border-bottom-color: var(--fire); }

.nav-sep { color: var(--iron); padding: 0 4px; font-size: 10px; flex-shrink: 0; }

/* ─── SEARCH BAR ─── */
.search-bar {
  padding: 20px 24px 0;
  position: relative; z-index: 1;
  max-width: 500px;
}

.search-bar input {
  width: 100%;
  background: var(--stone2);
  border: 1px solid var(--iron);
  border-radius: 6px;
  color: var(--parchment);
  font-family: 'Cinzel', serif;
  font-size: 13px;
  padding: 10px 16px 10px 40px;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--fire); }
.search-bar input::placeholder { color: var(--parchment-dim); }
.search-bar::before {
  content: '🔍';
  position: absolute; left: 36px; top: 50%; transform: translateY(-30%);
  font-size: 13px; opacity: 0.5; pointer-events: none;
}

/* ─── MAIN ─── */
main { position: relative; z-index: 1; padding: 24px; max-width: 1200px; margin: 0 auto; }

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ─── SECTION TITLE ─── */
.section-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(16px, 2.5vw, 24px);
  color: var(--gold-light);
  letter-spacing: 3px;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--iron);
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title::before { content: '⚔'; font-size: 18px; opacity: 0.6; }

/* ─── INFO CARDS ─── */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.info-card {
  background: var(--stone2);
  border: 1px solid var(--iron);
  border-radius: 8px;
  overflow: hidden;
}

.info-card-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  padding: 10px;
  background: rgba(139,0,0,0.3);
  border-bottom: 1px solid var(--iron);
  color: var(--gold-light);
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--parchment-dim); font-style: italic; }
.info-value { color: var(--parchment); font-weight: 600; font-family: 'Cinzel', serif; font-size: 12px; text-align: right; }
.info-value.highlight { color: var(--ember); }

/* ─── TABLE ─── */
.table-wrap {
  overflow-x: auto;
  border-radius: 8px;
  border: 1px solid var(--iron);
  margin-bottom: 28px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead tr {
  background: rgba(139,0,0,0.4);
}

th {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--gold-light);
  padding: 11px 14px;
  text-align: left;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  border-bottom: 1px solid var(--iron);
  transition: background 0.15s;
}
th:hover { background: rgba(200,50,0,0.2); }
th.sorted-asc::after { content: ' ↑'; color: var(--ember); }
th.sorted-desc::after { content: ' ↓'; color: var(--ember); }

tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
tbody tr:hover { background: rgba(255,255,255,0.04); }
tbody tr:nth-child(1) td:first-child::before { content: '🥇 '; }
tbody tr:nth-child(2) td:first-child::before { content: '🥈 '; }
tbody tr:nth-child(3) td:first-child::before { content: '🥉 '; }

td {
  padding: 10px 14px;
  color: var(--parchment);
  vertical-align: middle;
}

td.num { font-family: 'Cinzel', serif; font-size: 12px; color: var(--parchment-dim); }
td.rank-1 { color: var(--gold-light); font-weight: 700; }
td.rank-2 { color: #C0C0C0; }
td.rank-3 { color: var(--ember); }
td.name-cell { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; }

/* ─── HOF ─── */
.podium {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 12px;
  margin-bottom: 40px;
}

.p-item { display:flex; flex-direction:column; align-items:center; flex:1; max-width:260px; }
.p-avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel Decorative',cursive; font-weight:900; margin-bottom:8px; position:relative; }
.p-item.gold .p-avatar { width:84px; height:84px; font-size:28px; background:radial-gradient(circle at 30% 30%,#ff8855,#CC3300,#8B0000); color:#f0e6cc; box-shadow:0 0 30px rgba(200,50,0,0.6); }
.p-item.silver .p-avatar { width:68px; height:68px; font-size:22px; background:radial-gradient(circle at 30% 30%,#E8E8E8,#C0C0C0,#808080); color:#2a2a2a; }
.p-item.bronze .p-avatar { width:68px; height:68px; font-size:22px; background:radial-gradient(circle at 30% 30%,#E8A96A,#CD7F32,#8B4513); color:#2a1a00; }
.p-badge { position:absolute; top:-6px; right:-6px; font-size:16px; }
.p-name { font-family:'Cinzel',serif; font-size:13px; font-weight:600; letter-spacing:2px; margin-bottom:4px; text-align:center; }
.p-item.gold .p-name { font-size:15px; color:#FF6633; }
.p-item.silver .p-name { color:#C0C0C0; }
.p-item.bronze .p-name { color:#E8A96A; }
.p-medals { display:flex; flex-wrap:wrap; justify-content:center; gap:2px; margin-bottom:4px; min-height:26px; }
.p-score { font-size:11px; color:var(--parchment-dim); margin-bottom:8px; font-family:'Cinzel',serif; }
.p-item.gold .p-score { color:var(--ember); font-weight:600; }
.p-block { width:100%; border-radius:6px 6px 0 0; display:flex; align-items:center; justify-content:center; font-family:'Cinzel Decorative',cursive; font-weight:900; }
.p-item.gold .p-block { height:100px; font-size:24px; background:linear-gradient(180deg,#CC3300,#8B0000); color:#f0e6cc; box-shadow:0 -4px 20px rgba(200,50,0,0.3); }
.p-item.silver .p-block { height:68px; font-size:20px; background:linear-gradient(180deg,#C0C0C0,#808080); color:#2a2a2a; }
.p-item.bronze .p-block { height:46px; font-size:18px; background:linear-gradient(180deg,#E8A96A,#8B4513); color:#2a1a00; }

.chip { display:inline-flex; align-items:center; gap:2px; padding:2px 8px; border-radius:12px; font-size:11px; margin:1px; font-family:'Cinzel',serif; }
.chip.trophy { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25); color:#fff; }
.chip.gold-c { background:rgba(200,50,0,0.15); border:1px solid rgba(200,50,0,0.4); color:var(--ember); }
.chip.silver-c { background:rgba(192,192,192,0.1); border:1px solid rgba(192,192,192,0.3); color:#C0C0C0; }
.chip.bronze-c { background:rgba(205,127,50,0.1); border:1px solid rgba(205,127,50,0.3); color:#E8A96A; }

/* ─── SEARCH RESULTS ─── */
.search-results {
  background: var(--stone2);
  border: 1px solid var(--iron);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 20px;
}

.search-player-header {
  background: rgba(139,0,0,0.3);
  padding: 14px 20px;
  font-family: 'Cinzel Decorative', cursive;
  font-size: 16px;
  color: var(--gold-light);
  border-bottom: 1px solid var(--iron);
}

.search-war {
  padding: 12px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 16px;
  align-items: center;
}
.search-war:last-child { border-bottom: none; }
.search-war-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--parchment-dim); }
.search-war-stat { font-family: 'Cinzel', serif; font-size: 11px; color: var(--parchment-dim); text-align: right; }
.search-war-stat span { display: block; color: var(--parchment); font-size: 13px; }
.search-total-row {
  padding: 12px 20px;
  background: rgba(139,0,0,0.15);
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 16px;
  align-items: center;
  border-top: 1px solid var(--iron);
}
.search-total-row .search-war-name { color: var(--gold-light); font-weight: 600; }
.search-total-row .search-war-stat span { color: var(--ember); }

/* ─── LOADING / ERROR ─── */
.loading { text-align:center; padding:80px; color:var(--parchment-dim); font-style:italic; letter-spacing:3px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ─── EXPORT BTN ─── */
.export-btn {
  position:fixed; bottom:24px; right:24px;
  background:linear-gradient(135deg,#8B0000,#CC3300);
  color:var(--parchment); border:none; border-radius:50px;
  padding:12px 20px; font-family:'Cinzel',serif;
  font-size:11px; font-weight:600; letter-spacing:2px;
  cursor:pointer; box-shadow:0 4px 20px rgba(200,50,0,0.4);
  transition:transform 0.2s,box-shadow 0.2s; z-index:100;
}
.export-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(200,50,0,0.6); }

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  main { padding: 16px; }
  .podium { gap: 6px; }
  .p-item.gold .p-avatar { width:70px; height:70px; font-size:22px; }
  .p-item.silver .p-avatar, .p-item.bronze .p-avatar { width:56px; height:56px; font-size:18px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title">⚔ Hall of War ⚔</div>
  <div class="site-sub">Gloire aux guerriers sans merci</div>
</header>

<nav id="nav"></nav>

<div style="position:relative;z-index:1;max-width:1200px;margin:0 auto;">
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Rechercher un guerrier..." oninput="searchPlayer(this.value)">
  </div>
</div>

<div id="search-panel" style="display:none;position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:16px 24px;"></div>

<main id="main-content">
  <div class="loading">Chargement des archives de guerre...</div>
</main>

<button class="export-btn" onclick="openCard()">⚔ Partager</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz9x2I4nsMNeqRUoLDNry1T0UpPEGjTz_1TjNxmD5kzPUs6H0vVvEUybZ5v8g60wF-vCg/exec";
let globalData = null;
let currentPage = 'hof';
let sortState = {};

function fmt(n) {
  if (n === '' || n === null || n === undefined) return '—';
  if (typeof n === 'number') return n.toLocaleString('fr-FR');
  return n;
}

function calcScore(m) {
  if (!m) return 0;
  return (m.match(/🏆/g)||[]).length + (m.match(/🥇/g)||[]).length*5 + (m.match(/🥈/g)||[]).length*3 + (m.match(/🥉/g)||[]).length;
}

function chips(m) {
  if (!m) return '';
  const t=(m.match(/🏆/g)||[]).length, o=(m.match(/🥇/g)||[]).length, a=(m.match(/🥈/g)||[]).length, b=(m.match(/🥉/g)||[]).length;
  let out='';
  if(t>0) out+=`<span class="chip trophy">🏆 ${t}</span>`;
  if(o>0) out+=`<span class="chip gold-c">🥇 ${o}</span>`;
  if(a>0) out+=`<span class="chip silver-c">🥈 ${a}</span>`;
  if(b>0) out+=`<span class="chip bronze-c">🥉 ${b}</span>`;
  return out;
}

function getInitial(n) { return n ? n.charAt(0).toUpperCase() : '?'; }

// ─── NAVIGATION ───
function buildNav(data) {
  const nav = document.getElementById('nav');
  const pages = [
    { id:'hof', label:'🏆 Hall of War' },
    { id:'total', label:'📊 Total' },
  ];
  data.guerres.forEach((g, i) => { pages.push({ id:'guerre_'+i, label:'⚔ '+g.nom }); });

  nav.innerHTML = pages.map((p, i) =>
    `<button class="nav-btn ${p.id==='hof'?'active':''}" onclick="showPage('${p.id}')" data-page="${p.id}">${p.label}</button>`
    + (i < pages.length-1 ? '<span class="nav-sep">│</span>' : '')
  ).join('');
}

function showPage(id) {
  currentPage = id;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === id));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-'+id));
  document.getElementById('search-input').value = '';
  document.getElementById('search-panel').style.display = 'none';
}

// ─── RENDER ALL ───
function renderAll(data) {
  globalData = data;
  buildNav(data);

  const main = document.getElementById('main-content');
  let html = '';

  // HOF PAGE
  html += `<div class="page active" id="page-hof">`;
  html += renderHoF(data.hof);
  html += `</div>`;

  // TOTAL PAGE
  html += `<div class="page" id="page-total">`;
  html += renderFeuille(data.total, true);
  html += `</div>`;

  // GUERRE PAGES
  data.guerres.forEach((g, i) => {
    html += `<div class="page" id="page-guerre_${i}">`;
    html += renderFeuille(g, false);
    html += `</div>`;
  });

  main.innerHTML = html;
}

// ─── HOF ───
function renderHoF(hof) {
  if (!hof || !hof.length) return '<div class="loading">Aucune donnée</div>';
  const sorted = [...hof].sort((a,b) => calcScore(b.medailles)-calcScore(a.medailles));
  const top3 = sorted.slice(0,3);
  const rest = sorted.slice(3);

  const podOrder = [{i:1,c:'silver',l:'2',b:'🥈'},{i:0,c:'gold',l:'1',b:'🥇'},{i:2,c:'bronze',l:'3',b:'🥉'}];
  let pod = '<div class="section-title">Classement des Guerriers</div><div class="podium">';
  podOrder.forEach(({i,c,l,b}) => {
    const p = top3[i]; if(!p) return;
    pod += `<div class="p-item ${c}">
      <div class="p-avatar">${getInitial(p.nom)}<span class="p-badge">${b}</span></div>
      <div class="p-name">${p.nom}</div>
      <div class="p-medals">${chips(p.medailles)}</div>
      <div class="p-score">${calcScore(p.medailles)} pts</div>
      <div class="p-block">${l}</div>
    </div>`;
  });
  pod += '</div>';

  let rows = '';
  rest.forEach((p,i) => {
    rows += `<tr>
      <td class="name-cell">${p.nom}</td>
      <td>${chips(p.medailles)}</td>
      <td class="num">${calcScore(p.medailles)} pts</td>
    </tr>`;
  });

  return pod + `<div class="table-wrap"><table>
    <thead><tr>
      <th>Guerrier</th><th>Distinctions</th><th>Points</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ─── FEUILLE (Total ou Guerre) ───
function renderFeuille(f, isTotal) {
  if (!f) return '<div class="loading">Aucune donnée</div>';
  let html = `<div class="section-title">${isTotal ? '📊 ' : '⚔ '}${f.nom}</div>`;

  // Infos générales (Total) ou blocs Informations/Mercenaires (Guerre)
  const hasInfoGen = f.infoGenerales && Object.keys(f.infoGenerales).length;
  const hasInfos = f.infos && Object.keys(f.infos).length;
  const hasMerc = f.mercenaires && Object.keys(f.mercenaires).length;

  if (hasInfoGen || hasInfos || hasMerc) {
    html += '<div class="info-grid">';
    if (hasInfoGen) {
      html += '<div class="info-card"><div class="info-card-title">Informations Générales</div>';
      Object.entries(f.infoGenerales).forEach(([k,v]) => {
        html += `<div class="info-row"><span class="info-label">${k}</span><span class="info-value ${k.includes('durée')||k.includes('Durée')?'highlight':''}">${v||'—'}</span></div>`;
      });
      html += '</div>';
    }
    if (hasInfos) {
      html += '<div class="info-card"><div class="info-card-title">Informations</div>';
      Object.entries(f.infos).forEach(([k,v]) => {
        html += `<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${v||'—'}</span></div>`;
      });
      html += '</div>';
    }
    if (hasMerc) {
      html += '<div class="info-card"><div class="info-card-title">Mercenaires</div>';
      Object.entries(f.mercenaires).forEach(([k,v]) => {
        html += `<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${v||'—'}</span></div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  }

  // Tableau joueurs
  if (f.joueurs && f.joueurs.length) {
    const tid = 'tbl_' + f.nom.replace(/\s/g,'_');
    html += `<div class="table-wrap"><table id="${tid}">
      <thead><tr>
        <th onclick="sortTable('${tid}',0)">Guerrier</th>
        <th onclick="sortTable('${tid}',1)">Médailles</th>
        <th onclick="sortTable('${tid}',2)">Nbr. Atq</th>
        <th onclick="sortTable('${tid}',3)">Nbr. Def</th>
        <th onclick="sortTable('${tid}',4)">Nbr. Tué</th>
        <th onclick="sortTable('${tid}',5)">Cl. Tué</th>
        <th onclick="sortTable('${tid}',6)">Trp. Perdue</th>
        <th onclick="sortTable('${tid}',7)">Tué/Perte</th>
        <th onclick="sortTable('${tid}',8)">Cl. T/P</th>
        <th onclick="sortTable('${tid}',9)">Tué/A&D</th>
        <th onclick="sortTable('${tid}',10)">Cl. A&D</th>
      </tr></thead>
      <tbody>`;

    f.joueurs.forEach(j => {
      const clTue = j.classement_tue;
      const clTp = j.classement_tp;
      const clAad = j.classement_aad;
      html += `<tr>
        <td class="name-cell">${j.nom}</td>
        <td>${chips(j.medailles)}</td>
        <td class="num">${fmt(j.nbr_atq)}</td>
        <td class="num">${fmt(j.nbr_def)}</td>
        <td class="num">${fmt(j.nbr_tue)}</td>
        <td class="num ${clTue==1?'rank-1':clTue==2?'rank-2':clTue==3?'rank-3':''}">${fmt(clTue)}</td>
        <td class="num">${fmt(j.trp_perdue)}</td>
        <td class="num">${fmt(j.ratio_tp)}</td>
        <td class="num ${clTp==1?'rank-1':clTp==2?'rank-2':clTp==3?'rank-3':''}">${fmt(clTp)}</td>
        <td class="num">${fmt(j.tue_aad)}</td>
        <td class="num ${clAad==1?'rank-1':clAad==2?'rank-2':clAad==3?'rank-3':''}">${fmt(clAad)}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  }

  return html;
}

// ─── TRI ───
function sortTable(tid, col) {
  const table = document.getElementById(tid);
  if (!table) return;
  const key = tid+'_'+col;
  const asc = sortState[key] !== true;
  sortState[key] = asc;

  // Reset headers
  table.querySelectorAll('th').forEach((th,i) => {
    th.classList.remove('sorted-asc','sorted-desc');
    if (i===col) th.classList.add(asc?'sorted-asc':'sorted-desc');
  });

  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a,b) => {
    const va = a.cells[col]?.textContent.trim().replace(/[^\d.,-]/g,'').replace(',','.') || '';
    const vb = b.cells[col]?.textContent.trim().replace(/[^\d.,-]/g,'').replace(',','.') || '';
    const na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return asc ? na-nb : nb-na;
    return asc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  rows.forEach(r => tbody.appendChild(r));
}

// ─── RECHERCHE ───
function searchPlayer(query) {
  const panel = document.getElementById('search-panel');
  if (!query.trim() || !globalData) { panel.style.display='none'; return; }
  const q = query.toLowerCase().trim();

  // Trouver le joueur dans toutes les guerres
  const matches = new Set();
  globalData.guerres.forEach(g => {
    g.joueurs.forEach(j => { if(j.nom.toLowerCase().includes(q)) matches.add(j.nom); });
  });
  if (globalData.total) {
    globalData.total.joueurs.forEach(j => { if(j.nom.toLowerCase().includes(q)) matches.add(j.nom); });
  }

  if (!matches.size) {
    panel.style.display='block';
    panel.innerHTML = `<div class="search-results"><div class="search-player-header">Aucun guerrier trouvé</div></div>`;
    return;
  }

  let html = '';
  matches.forEach(nom => {
    let totTue=0, totPerte=0, totAad=0, totAtq=0, totDef=0;
    let warRows = '';

    globalData.guerres.forEach(g => {
      const j = g.joueurs.find(p => p.nom === nom);
      if (!j) return;
      totTue += j.nbr_tue||0; totPerte += j.trp_perdue||0;
      totAad += j.tue_aad||0; totAtq += j.nbr_atq||0; totDef += j.nbr_def||0;
      const ratio = (j.ratio_tp && j.ratio_tp !== 'Aucun' && j.ratio_tp !== '') ? fmt(j.ratio_tp) : 'N/A';
      warRows += `<div class="search-war">
        <span class="search-war-name">⚔ ${g.nom}</span>
        <span class="search-war-stat">Troupes tuées<span>${fmt(j.nbr_tue)}</span></span>
        <span class="search-war-stat">Trp. perdues<span>${fmt(j.trp_perdue)}</span></span>
        <span class="search-war-stat">Tué/Perte<span>${ratio}</span></span>
        <span class="search-war-stat">Tué/A&D<span>${fmt(j.tue_aad)}</span></span>
      </div>`;
    });

    // HoF stats
    const hofEntry = globalData.hof ? globalData.hof.find(p => p.nom === nom) : null;

    html += `<div class="search-results">
      <div class="search-player-header">
        ${nom} ${hofEntry ? chips(hofEntry.medailles) : ''}
      </div>
      ${warRows}
      <div class="search-total-row">
        <span class="search-war-name">TOTAL</span>
        <span class="search-war-stat">Troupes tuées<span>${fmt(totTue)}</span></span>
        <span class="search-war-stat">Trp. perdues<span>${fmt(totPerte)}</span></span>
        <span class="search-war-stat">Tué/A&D<span>${fmt(totAad)}</span></span>
      </div>
    </div>`;
  });

  panel.style.display = 'block';
  panel.innerHTML = html;
}

// ─── EXPORT ───
function openCard() {
  if (!globalData) return;
  const hof = [...(globalData.hof||[])].sort((a,b)=>calcScore(b.medailles)-calcScore(a.medailles));
  const top3 = hof.slice(0,3);
  const rest = hof.slice(3);
  const podConf = [{i:1,l:'2',h:'55px',bg:'linear-gradient(180deg,#C0C0C0,#808080)',tc:'#2a2a2a',nc:'#C0C0C0',em:'🥈'},{i:0,l:'1',h:'80px',bg:'linear-gradient(180deg,#CC3300,#8B0000)',tc:'#f0e6cc',nc:'#FF6633',em:'🥇'},{i:2,l:'3',h:'38px',bg:'linear-gradient(180deg,#E8A96A,#8B4513)',tc:'#2a1a00',nc:'#E8A96A',em:'🥉'}];

  function inlineChips(m) {
    if (!m) return '';
    const t=(m.match(/🏆/g)||[]).length,o=(m.match(/🥇/g)||[]).length,a=(m.match(/🥈/g)||[]).length,b=(m.match(/🥉/g)||[]).length;
    let out='';
    if(t>0) out+=`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:10px;font-size:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;margin:1px">🏆 ${t}</span>`;
    if(o>0) out+=`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:10px;font-size:10px;background:rgba(200,50,0,0.15);border:1px solid rgba(200,50,0,0.4);color:#FF6633;margin:1px">🥇 ${o}</span>`;
    if(a>0) out+=`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:10px;font-size:10px;background:rgba(192,192,192,0.1);border:1px solid rgba(192,192,192,0.3);color:#C0C0C0;margin:1px">🥈 ${a}</span>`;
    if(b>0) out+=`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:10px;font-size:10px;background:rgba(205,127,50,0.1);border:1px solid rgba(205,127,50,0.3);color:#E8A96A;margin:1px">🥉 ${b}</span>`;
    return out;
  }

  let pod='<div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:18px;">';
  podConf.forEach(({i,l,h,bg,tc,nc,em})=>{
    const p=top3[i]; if(!p) return;
    pod+=`<div style="display:flex;flex-direction:column;align-items:center;flex:1;"><div style="font-size:${l==='1'?'24px':'16px'};margin-bottom:3px;">${em}</div><div style="font-family:serif;font-size:${l==='1'?'13px':'11px'};font-weight:600;color:${nc};margin-bottom:3px;text-align:center;">${p.nom}</div><div style="margin-bottom:3px;">${inlineChips(p.medailles)}</div><div style="font-size:10px;color:${l==='1'?nc:'#8a7a5a'};margin-bottom:5px;">${calcScore(p.medailles)} pts</div><div style="width:100%;height:${h};border-radius:5px 5px 0 0;background:${bg};display:flex;align-items:center;justify-content:center;font-family:serif;font-weight:900;font-size:18px;color:${tc};">${l}</div></div>`;
  });
  pod+='</div>';

  let rows='';
  rest.forEach((p,i)=>{
    rows+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#1a1510;border:1px solid rgba(255,255,255,0.05);border-radius:6px;margin-bottom:3px;"><span style="font-size:11px;color:#8a7a5a;width:18px;text-align:center;flex-shrink:0;">${i+4}</span><span style="font-size:11px;flex:1;">${p.nom}</span><span>${inlineChips(p.medailles)}</span><span style="font-size:10px;color:#8a7a5a;flex-shrink:0;">${calcScore(p.medailles)} pts</span></div>`;
  });

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#1a1510;color:#f0e6cc;font-family:serif;width:480px;padding:22px 16px 18px;}</style></head><body><div style="text-align:center;margin-bottom:18px;"><div style="font-size:32px;margin-bottom:4px;">⚔️</div><div style="font-family:serif;font-size:22px;font-weight:900;color:#CC3300;letter-spacing:3px;">Hall of War</div><div style="font-size:9px;color:#8a7a5a;letter-spacing:4px;margin-top:5px;">Gloire aux guerriers sans merci</div><div style="width:120px;height:1px;background:linear-gradient(90deg,transparent,#CC3300,transparent);margin:10px auto;"></div></div>${pod}<div style="width:100%;height:1px;background:linear-gradient(90deg,transparent,#8B000044,transparent);margin:12px 0;"></div><div style="text-align:center;font-size:9px;color:#8a7a5a;letter-spacing:4px;margin-bottom:8px;">Classement complet</div>${rows}</body></html>`;

  const w=window.open('','_blank','width=520,height=800,scrollbars=yes,resizable=yes');
  w.document.open(); w.document.write(html); w.document.close();
}
